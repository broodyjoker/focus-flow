    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts — Inter (loaded here to avoid PostCSS @import ordering conflicts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"

    />

    <!-- SEO -->
    <title>Focus Flow — ADHD-Friendly To-Do</title>
    <meta
      name="description"
      content="Focus Flow is a calm, structured to-do app designed for the ADHD mind. Organise tasks into 10 life buckets, prioritise by energy, and tackle one thing at a time."
    />
    <meta name="theme-color" content="#ffffff" />

    <!-- Open Graph -->
    <meta property="og:title" content="Focus Flow" />

      content="ADHD-friendly task management — one focus at a time."
    />
